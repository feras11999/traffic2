name: Collect Route 343

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/run-route343-now"
  schedule:
    - cron: "0 2,8,14,20 * * *"

permissions:
  contents: read

concurrency:
  group: route-343-collector
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect Route 343 data
        env:
          TFNSW_API_KEY: ${{ secrets.TFNSW_API_KEY }}
          ROUTE_ID: "343"
          POLL_SECONDS: "15"
          MAX_RUNTIME_MINUTES: "340"
          STOP_AT_SYDNEY: "2026-07-26T23:00:00"
        run: python collect_route343.py

      - name: Upload collected CSV
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: route343-${{ github.run_id }}-${{ github.run_attempt }}
          path: output/*.csv
          if-no-files-found: warn
          retention-days: 30
