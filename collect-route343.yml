name: Collect Route 343 Until Sunday Night

on:
  workflow_dispatch:

  schedule:
    - cron: "5 0,6,12,18 23-26 7 *"
      timezone: "Australia/Sydney"

permissions:
  contents: read

concurrency:
  group: route343-continuous-collection
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 355

    steps:
      - name: Download repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Collect Route 343 data
        env:
          TFNSW_API_KEY: ${{ secrets.TFNSW_API_KEY }}
          TZ: Australia/Sydney
        run: python collect_route343.py

      - name: Upload CSV
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: route343-${{ github.run_number }}-${{ github.run_attempt }}
          path: route343_*.csv
          if-no-files-found: warn
          retention-days: 30
